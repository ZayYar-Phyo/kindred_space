{% extends "layouts/a.html" %}

{% block content %}

<!-- Hero Carousel Section -->
<div class="swiper heroSwiper w-full mb-8 rounded-2xl overflow-hidden shadow-2xl">
    <div class="swiper-wrapper">
        <!-- Slide 1 -->
        <div class="swiper-slide relative">
            <img src="/media/carousel/slide1.jpg" alt="Community Sharing" class="w-full h-[400px] md:h-[500px] object-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/50 to-transparent flex items-center">
                <div class="text-white px-6 md:px-12 max-w-2xl">
                    <h1 class="text-3xl md:text-5xl font-bold mb-4 leading-tight">思いやりの輪を、必要なところへ</h1>
                    <p class="text-lg md:text-xl mb-6 opacity-90">与えることと受け取ることの架け橋のなる</p>
                    <a href="{% url 'post-create' %}" class="inline-block bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-300 transform hover:scale-105">
                        始める
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Slide 2 -->
        <div class="swiper-slide relative">
            <img src="/media/carousel/slide2.jpg" alt="Community Connection" class="w-full h-[400px] md:h-[500px] object-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/50 to-transparent flex items-center">
                <div class="text-white px-6 md:px-12 max-w-2xl">
                    <h1 class="text-3xl md:text-5xl font-bold mb-4 leading-tight">思いやりの輪を、必要なところへ</h1>
                    <p class="text-lg md:text-xl mb-6 opacity-90">与えることと受け取ることの架け橋のなる</p>
                    <a href="{% url 'post-create' %}" class="inline-block bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-300 transform hover:scale-105">
                        始める
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Navigation Arrows -->
    <div class="swiper-button-next text-white"></div>
    <div class="swiper-button-prev text-white"></div>
    
    <!-- Pagination Dots -->
    <div class="swiper-pagination"></div>
</div>

<!-- Posts Section -->
<h2 class="text-2xl font-bold mb-4">最新の投稿</h2>
{% for post in posts %}
{% include 'a_posts/post.html' %}
{% endfor %}

<!-- Swiper Initialization Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const swiper = new Swiper('.heroSwiper', {
        loop: true,
        autoplay: {
            delay: 5000,
            disableOnInteraction: false,
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        speed: 800,
        effect: 'slide',
    });
});
</script>

{% endblock %}
