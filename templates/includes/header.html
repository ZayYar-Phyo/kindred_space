<header x-data="{ 
        mobilenavOpen: false,
        scrollingDown: false,
        lastScroll: 0,
        locationModalOpen: false,
        hasLocationFilter: false
    }" x-init="
        window.addEventListener('scroll', () => {
            let currentScroll = window.pageYOffset;
            if (currentScroll <= 0) {
                scrollingDown = false;
                return;
            }
            if (currentScroll > lastScroll && currentScroll > 100) {
                scrollingDown = true;
            } else if (currentScroll < lastScroll) {
                scrollingDown = false;
            }
            lastScroll = currentScroll;
        });
        // Check if location filter is active on page load
        hasLocationFilter = sessionStorage.getItem('viewer_latitude') && sessionStorage.getItem('viewer_longitude');
    " :class="scrollingDown ? '-translate-y-full' : 'translate-y-0'"
    class="md:flex items-center justify-between [&>*]:px-8 bg-gray-50 h-20 text-gray-800 sticky top-0 z-40 shadow-sm transition-transform duration-300 ease-in-out"
    x-effect="
        const urlParams = new URLSearchParams(window.location.search);
        const hasUrlParams = urlParams.get('lat') && urlParams.get('lng');
        const hasSessionData = sessionStorage.getItem('viewer_latitude') && sessionStorage.getItem('viewer_longitude');
        hasLocationFilter = hasUrlParams || hasSessionData;
    ">
    <div class="flex items-center justify-between h-20 gap-4">
        <logo>
            <a class="flex items-center gap-1" href="/">
                <img class="w-7 -mt-1" src="https://img.icons8.com/small/64/000000/fire-heart.png" />
                <span class="text-lg font-bold">Kindred Space</span>
            </a>
        </logo>

        <!-- Location Selector Button -->
        <div class="hidden md:flex items-center">
            <button @click="locationModalOpen = true"
                class="flex items-center gap-1.5 text-white hover:text-white-dark font-semibold transition-colors duration-200 whitespace-nowrap">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                        clip-rule="evenodd"></path>
                </svg>
                <span x-text="hasLocationFilter ? '現在地で絞り込み中' : '現在地を選択'"></span>
            </button>
            <!-- Clear filter button if active -->
            <button x-show="hasLocationFilter" @click="clearLocationFilter()"
                class="ml-2 text-gray-500 hover:text-gray-700 text-sm">
                ✕
            </button>
        </div>

        <mobileicon class="md:hidden">
            <a @click="mobilenavOpen = !mobilenavOpen"
                class="h-12 w-12 flex items-center justify-center cursor-pointer hover:bg-gray-200 rounded-lg">
                <img x-show="!mobilenavOpen" class="w-6 h-6 select-none"
                    src="https://img.icons8.com/small/64/000000/menu.png" />
                <img x-show="mobilenavOpen" x-cloak class="w-6 h-6 select-none"
                    src="https://img.icons8.com/small/64/000000/delete-sign.png" />
            </a>
        </mobileicon>
    </div>

    <!-- Search Bar -->
    <div class="flex items-center flex-1 max-w-md mx-4">
        <form method="GET" action="{% url 'home' %}" class="w-full">
            <div class="relative">
                <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="なにをお探しですか？"
                    class="w-full px-4 py-2.5 pr-10 text-gray-800 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4CAF50] focus:border-transparent transition-all" />
                <button type="submit" style="background: transparent !important; border: none !important;" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#4CAF50] transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <nav x-show="mobilenavOpen" x-cloak
        class="md:!block bg-gray-50 h-screen w-screen md:h-auto md:w-auto -mt-20 md:mt-0 absolute md:relative z-[-1]"
        x-transition:enter="duration-300 ease-out" x-transition:enter-start="opacity-0 -translate-y-96"
        x-transition:enter-end="opacity-100 translate-y-0">
        <ul
            class="flex items-center navitems flex-col md:flex-row gap-6 md:gap-6 justify-center h-full -translate-y-10 md:translate-y-0">
            <li><a href="/"
                    class="text-primary hover:bg-white-dark  font-semibold transition-colors duration-200">Home</a>
            </li>
            <li><a href="{%url 'post-create'%}"
                    class="bg-primary hover:bg-primary-dark text-white font-semibold px-4 py-2 rounded-lg transition-colors duration-200">CreatePost</a>
            </li>
            {% if user.is_authenticated %}
            <li x-data="{ dropdownOpen: false }" class="relative">
                <a @click="dropdownOpen = !dropdownOpen" @click.away="dropdownOpen = false"
                    class="cursor-pointer select-none">
                    <img class="h-8 w-8 rounded-full object-cover"
                        src="{% if user_profile and user_profile.profile_picture %}{{ user_profile.profile_picture.url }}{% else %}https://ui-avatars.com/api/?name={{ user.username }}&background=4CAF50&color=fff{% endif %}" />
                    {{ user.username }}
                    <img x-bind:class="dropdownOpen && 'rotate-180 duration-300'" class="w-4"
                        src="https://img.icons8.com/small/32/777777/expand-arrow.png" />
                </a>
                <div x-show="dropdownOpen" x-cloak
                    class="absolute right-0 bg-white text-black shadow rounded-lg w-40 p-2 z-20"
                    x-transition:enter="duration-300 ease-out"
                    x-transition:enter-start="opacity-0 -translate-y-5 scale-90"
                    x-transition:enter-end="opacity-100 translate-y-0 scale-100">
                    <ul class="hoverlist [&>li>a]:justify-end">
                        <li><a href="/users/{{ user.username }}/">My Profile</a></li>
                        <li><a href="#" class="opacity-50 cursor-not-allowed">Edit Profile</a></li>
                        <li>
                            <form method="POST" action="{% url 'logout' %}" class="inline">
                                {% csrf_token %}
                                <button type="submit" class="text-left w-full">Log Out</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </li>
            {% else %}
            <li><a href="{% url 'login' %}">ログイン</a></li>
            {% endif %}
        </ul>
    </nav>

    <!-- Location Selection Modal -->
    <div x-show="locationModalOpen" x-cloak class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title"
        role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Background overlay -->
            <div x-show="locationModalOpen" x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
                x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0" @click="locationModalOpen = false"
                class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <!-- Modal panel -->
            <div x-show="locationModalOpen" x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">

                <div class="sm:flex sm:items-start">
                    <div
                        class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-primary bg-opacity-10 sm:mx-0 sm:h-10 sm:w-10">
                        <svg class="h-6 w-6 text-primary" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                                clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                            現在地で絞り込み
                        </h3>
                        <div class="mt-2">
                            <p class="text-sm text-gray-500">
                                あなたの現在地周辺のアイテムやサービスを表示します。
                            </p>
                        </div>
                    </div>
                </div>

                <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse gap-3">
                    <button type="button" @click="useCurrentLocation($event)"
                        class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-primary text-base font-medium text-white hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary sm:ml-3 sm:w-auto sm:text-sm transition-colors duration-200">
                        現在地を使用
                    </button>
                    <button type="button" @click="locationModalOpen = false"
                        class="mt-3 w-full inline-flex justify-center rounded-lg border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary sm:mt-0 sm:w-auto sm:text-sm">
                        キャンセル
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Location Filter Script -->
    <script>
        function useCurrentLocation(event) {
            if (!navigator.geolocation) {
                alert('お使いのブラウザは位置情報をサポートしていません。');
                return;
            }

            // Show loading state - use currentTarget to get the button even if text is clicked
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.textContent = '位置情報を取得中...';

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const radius = 10; // Default 10km radius

                    // Store in sessionStorage
                    sessionStorage.setItem('viewer_latitude', lat);
                    sessionStorage.setItem('viewer_longitude', lng);
                    sessionStorage.setItem('viewer_radius', radius);

                    // Reload page with location parameters
                    const url = new URL(window.location.href);
                    url.searchParams.set('lat', lat);
                    url.searchParams.set('lng', lng);
                    url.searchParams.set('radius', radius);
                    window.location.href = url.toString();
                },
                function (error) {
                    btn.disabled = false;
                    btn.textContent = '現在地を使用';

                    let errorMessage = '位置情報の取得に失敗しました。';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'ブラウザの設定で位置情報のアクセスを許可してください。';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = '位置情報が利用できません。';
                            break;
                        case error.TIMEOUT:
                            errorMessage = '位置情報の取得がタイムアウトしました。';
                            break;
                    }
                    alert(errorMessage);
                }
            );
        }

        function clearLocationFilter() {
            sessionStorage.removeItem('viewer_latitude');
            sessionStorage.removeItem('viewer_longitude');
            sessionStorage.removeItem('viewer_radius');

            // Reload page without location parameters
            const url = new URL(window.location.href);
            url.searchParams.delete('lat');
            url.searchParams.delete('lng');
            url.searchParams.delete('radius');
            window.location.href = url.toString();
        }

        // Auto-apply location filter from sessionStorage on page load
        document.addEventListener('DOMContentLoaded', function () {
            const savedLat = sessionStorage.getItem('viewer_latitude');
            const savedLng = sessionStorage.getItem('viewer_longitude');
            const savedRadius = sessionStorage.getItem('viewer_radius') || '10';  // Default to 10km

            // If we have saved location but URL doesn't have parameters, reload with them
            if (savedLat && savedLng) {
                const url = new URL(window.location.href);
                const urlLat = url.searchParams.get('lat');

                if (!urlLat && window.location.pathname === '/') {
                    url.searchParams.set('lat', savedLat);
                    url.searchParams.set('lng', savedLng);
                    url.searchParams.set('radius', savedRadius);
                    // Full reload to trigger backend filter
                    window.location.href = url.toString();
                }
            }
        });
    </script>
</header>
